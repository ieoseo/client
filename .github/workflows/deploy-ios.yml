# 클라이언트(Flutter) release IPA 빌드 → App Store Connect(TestFlight) 업로드.
# - iOS 릴리스 빌드는 macOS 에서만 가능 → macos 러너 사용(public repo 라 무료).
# - 서명: 배포 인증서(.p12)를 keychain 에 import 해 재사용 + App Store Connect API 키로
#   프로비저닝 자동 발급(-allowProvisioningUpdates) 및 업로드. (fastlane match 없이 운영)
# - dart-define(운영 백엔드 값)이 비면 잘못된 서버를 가리키는 빌드가 되므로 먼저 가드한다.
#
# 트리거: 수동 실행 전용(workflow_dispatch). release-please 의 client 태그 머지 후 사람이 실행.
#
# 필요한 repo secrets(Settings → Secrets and variables → Actions):
#   APPLE_DIST_CERT_P12       = base64 < 배포용 .p12 (Apple Distribution 인증서 + 개인키)
#   APPLE_DIST_CERT_PASSWORD  = .p12 export 시 정한 비밀번호
#   ASC_API_KEY_P8            = base64 < App Store Connect API 키 .p8
#   ASC_KEY_ID                = API 키 Key ID
#   ASC_ISSUER_ID             = API 키 Issuer ID
#   SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL = 운영 dart-define 주입값(Android 와 공유)
name: deploy-ios

on:
  workflow_dispatch: {} # 수동 실행 전용

jobs:
  build-and-upload:
    # Apple 은 iOS 26 SDK(Xcode 26+)로 빌드한 앱만 업로드 허용(2026-06-15~). macos-latest
    # 가 아직 Xcode 16(iOS 18 SDK) 이미지라 409(SDK version) 가 나므로 macos-26 으로 고정.
    runs-on: macos-26
    # 최소권한: ASC_KEY_ID/ASC_ISSUER_ID 는 job env 로 전 스텝(서드파티 액션 포함)에 흘리지 않고
    # 실제 쓰는 스텝(검증·키배치·빌드)의 step env 로만 좁힌다.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # git rev-list 로 빌드번호(커밋 수)를 뽑으려면 전체 이력 필요

      # iOS CFBundleVersion(빌드번호)는 App Store 에서 단조 증가·고유해야 한다.
      # 커밋 수를 빌드번호로 쓰면 매 커밋마다 증가해 중복 업로드를 막는다.
      - name: Compute build number
        run: echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      # 운영 dart-define + 서명 secret 이 하나라도 비면 빠르게 실패시켜 오배포를 막는다.
      - name: Verify required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          APPLE_DIST_CERT_P12: ${{ secrets.APPLE_DIST_CERT_P12 }}
          APPLE_DIST_CERT_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_ANON_KEY API_BASE_URL \
                   APPLE_DIST_CERT_P12 APPLE_DIST_CERT_PASSWORD \
                   ASC_API_KEY_P8 ASC_KEY_ID ASC_ISSUER_ID; do
            eval "val=\${$v}"
            [ -z "$val" ] && missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error::필수 secret 누락 →$missing (repo Settings → Secrets 에 등록 후 재실행)"
            exit 1
          fi

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - run: flutter pub get

      # 배포 인증서(.p12)를 임시 keychain 에 import — 자동서명이 새 인증서를 만들지 않고
      # 기존 것을 재사용하게 해(인증서 한도 소모 방지) CI 에서도 결정적으로 서명한다.
      - name: Import Apple distribution certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}

      # ASC API 키 .p8 를 파일로 풀고 경로를 다음 스텝에 넘긴다(fastlane app_store_connect_api_key 용).
      - name: Place App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$KEY_PATH"
          echo "ASC_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # 빌드 + TestFlight 업로드(fastlane). CI 자동 서명은 계정을 요구해 실패하므로
      # 수동 서명(프로파일은 API 키로 sigh 자동 발급)으로 처리한다 → ios/fastlane/Fastfile.
      - name: Build & upload to TestFlight (fastlane)
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: fastlane beta
