# 클라이언트(Flutter) release AAB 빌드 → Google Play 내부테스트 트랙 업로드.
# - 빌드는 항상 실행(서명 키 secret 있으면 업로드 키로 서명, 없으면 debug 폴백 — 산출물 확인용).
# - Play 업로드는 PLAY_SERVICE_ACCOUNT_JSON secret 이 있을 때만(없으면 안전 skip).
# - ARM mac 은 Android AOT 릴리스 빌드 불가 → x64(ubuntu) 에서 빌드한다.
#
# 트리거: 수동 실행 전용(workflow_dispatch).
# Release Please 의 client 태그는 `ieoseo-client-vX.Y.Z` 형태라 옛 `v*` push 트리거는
# 절대 매칭되지 않아(죽은 트리거였음) 제거했다. 배포는 릴리스 PR 머지 후 사람이
# 이 워크플로를 수동 실행해 Play 에 올린다(배포 통제 단순화).
#
# 필요한 repo secrets(Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   = base64 < ieoseo-upload.jks
#   ANDROID_KEYSTORE_PASSWORD = 키스토어 비밀번호(=키 비밀번호)
#   PLAY_SERVICE_ACCOUNT_JSON = Google Play Console 서비스 계정 JSON(전체 내용)
# 참고: 키 alias 는 비밀이 아니라 고정값 `upload` 라 secret 이 아니라 아래 env 리터럴로 둔다
#   (secret 으로 두면 흔한 단어 "upload" 가 로그 곳곳에서 과도 마스킹된다).
#   SUPABASE_URL / SUPABASE_ANON_KEY / API_BASE_URL = 운영 dart-define 주입값(필수)
name: release-client

on:
  workflow_dispatch: {} # 수동 실행 전용

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    # secret 컨텍스트는 step `if` 에서 비어 나올 수 있어 job env 로 boolean 매핑 후 게이트한다.
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # 운영 dart-define 값이 비어 있으면 잘못된 서버를 가리키는 AAB 가 만들어져
      # Play 에 그대로 올라갈 수 있다. 빌드 전에 빠르게 실패시켜 오배포를 막는다.
      - name: Verify required production secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          missing=""
          [ -z "$SUPABASE_URL" ] && missing="$missing SUPABASE_URL"
          [ -z "$SUPABASE_ANON_KEY" ] && missing="$missing SUPABASE_ANON_KEY"
          [ -z "$API_BASE_URL" ] && missing="$missing API_BASE_URL"
          if [ -n "$missing" ]; then
            echo "::error::필수 운영 secret 누락 →$missing (repo Settings → Secrets 에 등록 후 재실행)"
            exit 1
          fi

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - run: flutter pub get

      # 업로드 키스토어 복원(secret 있을 때만). 없으면 gradle 이 debug 키로 폴백.
      - name: Restore upload keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: upload # 비밀 아님(고정 alias) — secret 과도 마스킹 회피
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/ieoseo-upload.jks"
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$RUNNER_TEMP/ieoseo-upload.jks
          EOF

      # 운영 설정은 코드에 하드코딩하지 않는다(ADR-0014) — 미주입 시 main 가드가
      # 스플래시 전에 던져 부팅이 멈춘다. prod 값을 dart-define 으로 주입한다.
      - name: Build release AAB
        # --obfuscate + --split-debug-info: Dart 심볼을 난독화하고 디버그 심볼을 분리한다(S7).
        # split-debug-info 산출물은 크래시 심볼화 전용이라 업로드/커밋하지 않는다.
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=API_BASE_URL="$API_BASE_URL"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # AAB 를 워크플로 artifact 로 올리지 않는다 — public 저장소에선 누구나 내려받을 수 있어
      # 불필요한 노출이 된다. Play 업로드는 빌드 산출물 파일을 같은 잡에서 직접 사용하므로
      # artifact 가 필요 없다(디버깅이 필요하면 짧은 retention 으로 일시 추가).

      # Play 내부테스트 업로드 — 서비스 계정 secret 있을 때만.
      - name: Upload to Google Play (internal)
        if: ${{ env.HAS_PLAY == 'true' }}
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.ieoseo
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
